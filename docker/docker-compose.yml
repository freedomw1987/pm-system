version: '3.8'

services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../infra/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../docker/certs:/etc/nginx/certs:ro
      - uploads:/app/uploads
    depends_on:
      - frontend
      - backend
    networks:
      - pm-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=/api
    networks:
      - pm-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgresql://pm_user:pm_password@host.docker.internal:5432/pm_system?schema=public
      - JWT_SECRET=pm-system-jwt-secret-key-change-in-production-2025
      - REFRESH_TOKEN_SECRET=pm-system-refresh-token-secret-key-change-in-production-2025
      - UPLOAD_DIR=/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - uploads:/app/uploads
    networks:
      - pm-network

volumes:
  uploads:

networks:
  pm-network:
    driver: bridge