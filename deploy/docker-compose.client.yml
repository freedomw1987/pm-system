# ============================================================
# PM-System — 客戶機專用 docker-compose
# 由 install.sh 呼叫,客戶唔應該直接 compose up
# ============================================================
services:
  frontend:
    image: pm-system-frontend:${VERSION:-v1.0.0}
    container_name: pm-system-frontend
    restart: unless-stopped
    ports:
      # Host port 80(可改)-:80(nginx 入面)
      - "${FRONTEND_HOST_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - pm-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    image: pm-system-backend:${VERSION:-v1.0.0}
    container_name: pm-system-backend
    restart: unless-stopped
    # Backend port 唔公開 bind host,只喺 internal network 行
    # 前端經 nginx proxy 訪問
    expose:
      - "4000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET 必填(見 install.sh)}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      NODE_ENV: production
      PORT: "4000"
    networks:
      - pm-net
    healthcheck:
      # bun:1-alpine 冇 curl,用 wget(alpine busybox 預設有)
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/api/projects >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    # 注意: 用 db push 而非 migrate deploy,客戶機 first boot 會 force sync schema
    # (冇 migration history)。客戶 update v1.0.1 時, 新 image 嘅 schema 同 DB schema diff
    # 可能 silently drop column → data loss。客戶 update 前必須 backup DB。
    # 若要改返 migrate deploy, 改呢行得: `bunx prisma migrate deploy && bun src/index.ts`
    # (但咁要 image 入面保留完整 prisma/migrations/ folder)
    command: ["sh", "-c", "bunx prisma db push && bunx prisma db seed && bun src/index.ts"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db:
    # ⚠️ 客戶機無法 docker pull,改用 install.sh 預先 load + re-tag 嘅 local image
    # 對應 release tarball: pm-system-postgres-${VERSION}-{arch}.tar
    image: pm-system-postgres:${VERSION:-v1.0.0}
    container_name: pm-system-db
    restart: unless-stopped
    # 唔對外暴露(內部 network only)
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pm-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    name: pm-system-postgres-data

networks:
  pm-net:
    name: pm-system-net
    driver: bridge
