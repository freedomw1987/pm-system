# ============================================================
# PM-System — 客戶機專用 docker-compose
# 由 install.sh 呼叫,客戶唔應該直接 compose up
# ============================================================
services:
  frontend:
    image: pm-system-frontend:${VERSION:-v1.0.0}
    container_name: pm-system-frontend
    restart: unless-stopped
    ports:
      # Host port 80(可改)-:80(nginx 入面)
      - "${FRONTEND_HOST_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - pm-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    image: pm-system-backend:${VERSION:-v1.0.0}
    container_name: pm-system-backend
    restart: unless-stopped
    # Backend port 唔公開 bind host,只喺 internal network 行
    # 前端經 nginx proxy 訪問
    expose:
      - "4000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET 必填(見 install.sh)}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      NODE_ENV: production
      PORT: "4000"
    networks:
      - pm-net
    healthcheck:
      # bun:1-alpine 冇 curl,用 wget(alpine busybox 預設有)
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/api/projects >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    command: ["sh", "-c", "bunx prisma migrate deploy && bun prisma/seed.ts && bun src/index.ts"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:15-alpine
    container_name: pm-system-db
    restart: unless-stopped
    # 唔對外暴露(內部 network only)
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pm-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    name: pm-system-postgres-data

networks:
  pm-net:
    name: pm-system-net
    driver: bridge
