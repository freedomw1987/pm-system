# ============================================================
# PM System — 本地開發環境
# 使用方式：docker compose up -d
# ============================================================
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      # HTTP 80 → 自動 301 redirect 去 HTTPS(由 nginx.conf.template 處理)
      - "8080:80"
      # HTTPS 443 — 服務實際 frontend + /api proxy
      # 443 係 privileged port,本機用 8443 map 去 container 嘅 443
      - "8443:443"
    volumes:
      # Self-signed TLS cert(由 deploy/gen-cert.sh 產生,放 deploy/docker/certs/)
      # 跟 production docker-compose.client.yml 一樣嘅 mount path
      - ./deploy/docker/certs:/etc/nginx/certs:ro
    environment:
      # 配合 host port 8443 → container 443
      # EXTERNAL_HTTPS_PORT 控制 HTTP→HTTPS redirect 嘅 target port
      EXTERNAL_HTTPS_PORT: "443"
      EXTERNAL_HTTP_PORT: "80"
    depends_on:
      - backend
    healthcheck:
      # wget --no-check-certificate 因為 self-signed cert 唔受默認信任
      # 撞 HTTPS endpoint 而唔係 HTTP(後者會 301,跟 redirect 會撞 cert 問題)
      test: ["CMD-SHELL", "wget --no-check-certificate -qO- https://127.0.0.1:443/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4001:4000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://pmuser:pmpassword@db:5432/pmdb
      JWT_SECRET: dev-secret-key
      FRONTEND_URL: http://localhost
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    command: sh -c "bunx prisma db push && bunx prisma db seed && bun src/index.ts"

  db:
    image: postgres:15-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: pmuser
      POSTGRES_PASSWORD: pmpassword
      POSTGRES_DB: pmdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pmuser -d pmdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: