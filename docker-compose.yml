services:
  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "4001:4000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://pmuser:pmpassword@db:5432/pmdb
      JWT_SECRET: your-secret-key
      FRONTEND_URL: http://localhost
    command: sh -c "npx prisma db push && npx prisma db seed && bun src/index.ts"

  db:
    image: postgres:15-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: pmuser
      POSTGRES_PASSWORD: pmpassword
      POSTGRES_DB: pmdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pmuser -d pmdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: